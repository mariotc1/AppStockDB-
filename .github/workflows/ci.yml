name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: pip install flake8 flake8-bugbear

      - name: Run flake8 on backend
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E402 \
            --exclude=__pycache__

      - name: Run flake8 on frontend
        run: |
          flake8 frontend/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E402 \
            --exclude=__pycache__

  test:
    name: API Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: db_inmuebles_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -ptestpassword --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Load database schema
        run: |
          mysql -h 127.0.0.1 -u root -ptestpassword db_inmuebles_test < database/schema.sql
        env:
          MYSQL_PWD: testpassword

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=backend --cov-report=term-missing
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpassword
          DB_NAME: db_inmuebles_test
          API_BASE_URL: http://127.0.0.1:5000
